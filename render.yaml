# Render Blueprint — one-click live demo.
# https://render.com/docs/blueprint-spec
#
# Deploys a single free instance using the in-memory store (no database
# needed). Secrets do not survive a restart — fine for a public demo, not
# for production. For production, switch STORE_DRIVER to "redis", add a
# Redis instance, and set REDIS_URL.
services:
  - type: web
    name: ghostdrop-demo
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: STORE_DRIVER
        value: memory
      # Render generates a strong random value and keeps it stable.
      - key: JWT_SECRET
        generateValue: true
