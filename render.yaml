# Render Blueprint — free one-click live deploy.
# https://render.com/docs/blueprint-spec
#
# STORE_DRIVER=auto means: if you provide a REDIS_URL (e.g. a free Upstash
# database, rediss://...), secrets persist across restarts and idle spin-down;
# if you leave it blank, it falls back to an in-memory store. REDIS_URL is
# marked `sync: false`, so Render prompts for it and never writes it to git.
services:
  - type: web
    name: ghostdrop-demo
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: STORE_DRIVER
        value: auto
      # Optional. A managed Redis URL, e.g. rediss://default:<password>@<host>:<port>.
      # Set it for persistence; leave blank to run in-memory.
      - key: REDIS_URL
        sync: false
      # Render generates a strong value once and keeps it stable, so device
      # "poison" tokens stay valid across restarts.
      - key: JWT_SECRET
        generateValue: true
