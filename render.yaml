# Render Blueprint — free live deploy with a persistent store.
# https://render.com/docs/blueprint-spec
#
# Points GhostDrop at an external Redis (e.g. a free Upstash database) so
# secrets survive instance restarts and the free tier's idle spin-down.
# Set REDIS_URL to your Upstash connection string (rediss://...) when Render
# prompts for it — it is marked `sync: false`, so the secret is never written
# to git.
#
# No external Redis? Set STORE_DRIVER to "memory" and delete the REDIS_URL
# entry — data then lives in memory and is lost on every restart.
services:
  - type: web
    name: ghostdrop-demo
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: STORE_DRIVER
        value: redis
      # Your managed Redis URL, e.g. rediss://default:<password>@<host>:<port>.
      # Marked secret: Render asks for it at deploy and keeps it out of the repo.
      - key: REDIS_URL
        sync: false
      # Render generates a strong value once and keeps it stable, so device
      # "poison" tokens stay valid across restarts.
      - key: JWT_SECRET
        generateValue: true
