services:
  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'no', '--save', '']
    ports:
      - '6379:6379'
    restart: unless-stopped

  app:
    build: .
    depends_on:
      - redis
    environment:
      - PORT=3000
      - STORE_DRIVER=redis
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    ports:
      - '3000:3000'
    restart: unless-stopped
